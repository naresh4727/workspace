<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Workspace Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsiveStyle.css">
</head>

<body>

    <div class="login-page-wrapper">
        <div class="container-fluid h-100 p-0">
            <div class="row g-0 h-100">
                <div class="col-lg-6 col-md-6 login-form-side">
                    <div class="login-form-inner">
                        <div class="brand-logo-container">
                            <div class="logo-box">W</div>
                        </div>

                        <h2 class="auth-title">Welcome Back!</h2>
                        <p class="auth-subtitle">Please Sign In to continue</p>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <div class="input-with-icon">
                                    <i class="fa-solid fa-envelope"></i>
                                    <input type="email" id="email" class="form-control" value="nskadmin@workspace.com"
                                        required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-with-icon">
                                    <i class="fa-solid fa-lock"></i>
                                    <input type="password" id="password" class="form-control" value="nsk$admin@55"
                                        required>
                                    <i class="fa-regular fa-eye-slash toggle-pass" id="eyeBtn"></i>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label text-muted small" for="remember">Remember me</label>
                                </div>
                                <a href="#" class="forgot-link">Forgot Password</a>
                            </div>

                            <button type="submit" class="btn btn-login-primary">Login</button>
                        </form>

                        <div class="auth-footer">
                            Don't have account? <a href="#">Contact your admin.</a>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 col-md-6 d-none d-md-flex login-visual-side">
                    <div class="illustration-wrapper">
                        <img src="img/Workspace Illustration.png" alt="Workspace Illustration" class="floating-img">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="authToast" class="toast hide" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header border-0">
                <strong class="me-auto" id="toastTitle">Alert</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body fw-medium" id="toastBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
